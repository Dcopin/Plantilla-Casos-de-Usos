<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plantilla Caso de Uso</title>

    <style>
        body {
            font-family: "Times New Roman", serif;
            margin: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        textarea, input {
            width: 100%;
            padding: 10px;
            border: 1px solid black;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        @media print {
            button {
                display: none;
            }
        }
    </style>

</head>

<body>

<div class="container">

    <h1>MODELO DE CASO DE USO</h1>

    <div class="section">
        <label>Nombre del Sistema:</label>
        <input type="text" placeholder="Ej: Sistema de Gestión de Usuarios">
    </div>

    <div class="section">
        <label>Actores:</label>
        <textarea rows="4" placeholder="Ej: Usuario, Administrador"></textarea>
    </div>

    <div class="section">
        <label>Casos de Uso:</label>
        <textarea rows="6" placeholder="Ej: Registrar usuario, Iniciar sesión"></textarea>
    </div>

    <div class="section">
        <label>Relaciones (Comunica, Incluye, Extiende, Generaliza):</label>
        <textarea rows="6" placeholder="Ej: Usuario comunica con Iniciar sesión"></textarea>
    </div>

    <button onclick="window.print()">Exportar a PDF</button>

</div>

</body>
</html>
